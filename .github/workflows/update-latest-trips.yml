name: Update Latest Trips

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

permissions:
  contents: write

jobs:
  update-latest-trips:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate latest-trips.json
        env:
          BACKEND_API_BASE_URL: ${{ secrets.BACKEND_API_BASE_URL }}
          BACKEND_API_BEARER_TOKEN: ${{ secrets.BACKEND_API_BEARER_TOKEN }}
        run: npm run generate:latest-trips

      - name: Commit updated JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update latest trips json"
          file_pattern: latest-trips.json
